server:
    name: prod-web-01
    ip: 192.168.0.1
    port: 9090

database:
    host: localhost
    name: appdb
    credentials:
        user: dbadmin
        password: passwd

startup_script: |
    #!/bin/bash
    echo "starting server..."
    systemctl start nginx
    systemctl start app

startup_message: >
    This server runs the main application.
    It connects to the database on localhost.
    All logs go to /var/log/app/.
