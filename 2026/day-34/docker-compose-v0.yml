services:
    web:
        build: ./app
        ports:
            - "5000:5000"
        environment:
            DB_HOST: db
            DB_NAME: myapp
            DB_USER: myuser
            DB_PASSWORD: mypassword
        depends_on:
            db:
                condition: service_healthy # Wait until DB passes healthcheck
            cache:
                condition: service_started # Redis starts fast, no need for healthcheck
    db:
        image: postgres:16-alpine
        restart: always
        environment:
            POSTGRES_DB: myapp
            POSTGRES_USER: myuser
            POSTGRES_PASSWORD: mypassword
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U myuser -d myapp"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

    cache:
        image: redis:7-alpine
        restart: on-failure
