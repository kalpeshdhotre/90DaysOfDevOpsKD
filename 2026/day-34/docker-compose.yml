services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "${FLASK_PORT}:5000"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - frontend
      - backend
    labels:
      com.myapp.service: "web"
      com.myapp.env: "dev"
    restart: on-failure

  db:
    image: postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      com.myapp.service: "db"
      com.myapp.env: "dev"
    restart: always

  cache:
    image: redis:${REDIS_VERSION}
    volumes:
      - redisdata:/data
    networks:
      - backend
    labels:
      com.myapp.service: "cache"
      com.myapp.env: "dev"
    restart: on-failure

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
